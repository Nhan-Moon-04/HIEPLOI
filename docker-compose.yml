version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hieploi_db
    environment:
      POSTGRES_DB: hieploi_hr
      POSTGRES_USER: hieploi
      POSTGRES_PASSWORD: hieploi2026
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hieploi -d hieploi_hr"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
